name: Deploying Application on AWS and pushing Dockerhub registry
on:
  push:
    branches: [ master ]
  workflow_dispatch:
    inputs:
      logLevel:
        description: 'Trigger manually'
        required: true
        default: 'true'

jobs:
  BUILD-THIRD-LAYER-API:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        registry: docker.io
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Build image
      uses: docker/build-push-action@v6
      with:
        platforms: linux/amd64
        push: false
        load: true
        tags: docker.io/zero101010/third-layer-api:${{ github.sha }}
        context: .
        file: Dockerfile.api

    - name: Docker Scout CVEs
      uses: docker/scout-action@v1
      with:
        command: cves
        image: docker.io/zero101010/third-layer-api:${{ github.sha }}
        only-severities: critical
        exit-code: true

    - name: Push image
      run: docker push docker.io/zero101010/third-layer-api:${{ github.sha }}

    
  BUILD-THIRD-LAYER-WORKER:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        registry: docker.io
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Build image
      uses: docker/build-push-action@v6
      with:
        platforms: linux/amd64
        push: false
        load: true
        tags: docker.io/zero101010/third-layer-worker:${{ github.sha }}
        context: .
        file: Dockerfile.worker

    - name: Docker Scout CVEs
      uses: docker/scout-action@v1
      with:
        command: cves
        image: docker.io/zero101010/third-layer-worker:${{ github.sha }}
        only-severities: critical
        exit-code: true

    - name: Push image
      run: docker push docker.io/zero101010/third-layer-worker:${{ github.sha }}